# Monolith PROD hardening (active with SPRING_PROFILES_ACTIVE=prod). Overrides application.properties;
# local dev (default profile) is unaffected. See docs/prod-hardening.md (P3).

# F9: Hibernate must not mutate a live schema. 'update' first prod boot, 'validate' after Flyway (P4).
hibernate.hbm2ddl.auto=${DDL_AUTO:validate}
hibernate.show_sql=false

# Caching ON in prod (dev disables these for hot-reload).
spring.thymeleaf.cache=true
spring.web.resources.cache.period=3600

# F12 (DevTools): off in prod.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# F13: bound uploads.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# F11: quiet SQL logging.
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# F10: minimal actuator.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
