spring.main.allow-bean-definition-overriding=true

# spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.jackson.serialization.write-dates-as-timestamps=false

# Thymeleaf — disable cache so template changes reflect instantly
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/

# DevTools — auto restart on class changes
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Static resources — disable cache for JS/CSS
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# Service identity
spring.application.name=myplus

# Config Server — fetch centralized config before local properties are applied.
# optional: prefix means the app still starts if Config Server is unreachable.
spring.config.import=optional:configserver:http://config:config-pass@localhost:8888

# Service discovery — Eureka client (also served from Config Server, kept here as fallback)
eureka.client.service-url.defaultZone=http://eureka:eureka-pass@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true