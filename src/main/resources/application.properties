spring.mvc.favicon.enabled=false

# spring.thymeleaf.cache=true
#    5am every day
purge.cron.expression=0 0 5 * * ?

server.port=8080

# Uncomment the keys to enable captcha
google.recaptcha.key.site=6LfaHiITAAAAAAgZBHl4ZUZAYk5RlOYTr6m2N34X
google.recaptcha.key.secret=${RECAPTCHA_SECRET:}

################### JavaMail Configuration ##########################
support.email=maxtheservice@gmail.com
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.protocol=smtps
spring.mail.username=maxtheservice
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtps.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.transport.protocol=smtps
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.starttls.enable=true
spring.mail.properties.mail.smtps.timeout=8000

# uncomment this property to see the SQL statements generated
#logging.level.org.hibernate.SQL=DEBUG

# server.contextPath=/
server.servlet.context-path =/

spring.main.allow-bean-definition-overriding=true

# spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.jackson.serialization.write-dates-as-timestamps=false

# Thymeleaf — disable cache so template changes reflect instantly
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/

# DevTools — auto restart on class changes
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Static resources — disable cache for JS/CSS
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# Service identity
spring.application.name=myplus

# Config Server — fetch centralized config before local properties are applied.
# optional: prefix means the app still starts if Config Server is unreachable.
# Load git-ignored local secrets (DB_PASSWORD, MAIL_PASSWORD, RECAPTCHA_SECRET) from repo-root
# .env.local for dev; in prod these come from the environment / Secrets Manager. See .env.example.
spring.config.import=optional:file:./.env.local[.properties],optional:configserver:http://config:${CONFIG_SERVER_PASSWORD:config-pass}@localhost:8888

# Service discovery — Eureka client (also served from Config Server, kept here as fallback)
eureka.client.service-url.defaultZone=http://eureka:${EUREKA_PASSWORD:eureka-pass}@localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- Auth integration (Phase 2) ---
# auth.mode: 'local' authenticates against the local DB (legacy); 'server' delegates login to
# the auth-service JWT IdP. Keep 'local' until the user-store migration (Phase 1 SQL) has run.
# auth.mode=local

auth.mode=server
# Auth server reached via the API gateway; /api/auth/** is open (no JWT filter).
auth.server.url=http://localhost:8765

# API gateway base for downstream service calls (Phase 3). In server mode GatewayClient calls
# gateway.url + /api/<service> + path with a Bearer token; in local mode it falls back to the
# per-service *.service.url below with X-User-* headers.
gateway.url=http://localhost:8765
business.service.url=http://localhost:8083
education.service.url=http://localhost:8084
welfare.service.url=http://localhost:8085
agriculture.service.url=http://localhost:8086