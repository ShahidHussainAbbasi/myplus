<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- CSS Fragment — included in <head> of every page -->
    <th:block th:fragment="header-css">
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
        <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-datepicker.min.css}">
        <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap-select.min.css}"/>
        <link rel="stylesheet" th:href="@{/css/jquery.dataTables.min.css}">
        <link rel="stylesheet" th:href="@{/css/buttons.dataTables.min.css}">
        <link rel="stylesheet" th:href="@{/css/application.css}"/>
        <link rel="stylesheet" th:href="@{/main.css}"/>
        <link rel="stylesheet" th:href="@{/css/jquery.timepicker.min.css}"/>
    </th:block>

    <!-- JS Fragment — included at bottom of <body> of every page -->
    <th:block th:fragment="header-js">
        <script th:src="@{/js/jquery.min.js}"></script>
        <script th:src="@{/js/jquery-3.3.1.js}"></script>
        <script th:src="@{/js/moment.js}"></script>
        <script th:src="@{/js/jquery.timepicker.min.js}"></script>
        <script th:src="@{/js/jquery.dataTables.min.js}"></script>
        <script th:src="@{/bootstrap/js/bootstrap-datetimepicker.js}"></script>
        <script th:src="@{/bootstrap/js/bootstrap-select.min.js}"></script>
        <script th:src="@{/jQExp/dataTables.buttons.min.js}"></script>
        <script th:src="@{/jQExp/buttons.flash.min.js}"></script>
        <script th:src="@{/jQExp/jszip.min.js}"></script>
        <script th:src="@{/jQExp/pdfmake.min.js}"></script>
        <script th:src="@{/jQExp/vfs_fonts.js}"></script>
        <script th:src="@{/jQExp/buttons.html5.min.js}"></script>
        <script th:src="@{/jQExp/buttons.print.min.js}"></script>
        <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
         <script th:src="@{/bootstrap/js/bootstrap-datepicker.min.js}"></script>
        <script th:src="@{/js/main.js}"></script>
    </th:block>

    <!-- Navbar Fragment -->
    <nav th:fragment="header" id="header" class="navbar navbar-inverse">
        <div class="container-fluid">
            <div class="navbar-header">
                <!-- Hamburger toggle — collapses nav on mobile -->
                <button type="button" class="navbar-toggle collapsed"
                        data-toggle="collapse" data-target="#main-navbar-collapse"
                        aria-expanded="false" aria-controls="main-navbar-collapse">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <p style="color: lightskyblue; padding-top: 17px"
                   class="glyphicon glyphicon-user"
                   th:if="${param.user} != null"
                   th:text="${param.user[0]}">User</p>
            </div>
            <div class="collapse navbar-collapse" id="main-navbar-collapse">
                <ul class="nav navbar-nav">
                    <li>
                        <img th:src="@{/favicon.png}" height="50" width="42"/>
                    </li>
                    <li>
                        <a th:href="@{/home}">
                            <span class="glyphicon glyphicon-home">&nbsp;Home</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/}">
                            <span class="glyphicon glyphicon-dashboard">&nbsp;Dashboard</span>
                        </a>
                    </li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li th:if="${#authorization.expression('!isAuthenticated()')}">
                        <a th:href="@{/login}">
                            <span class="glyphicon glyphicon-log-in"></span>&nbsp;Sign in
                        </a>
                    </li>
                    <li th:if="${#authorization.expression('isAuthenticated()')}">
                        <a href="#" onclick="$('#logoutForm').submit();">
                            <span class="glyphicon glyphicon-log-out"></span>&nbsp;Logout
                        </a>
                        <form style="visibility:hidden" id="logoutForm"
                              method="post" th:action="@{/logout}"></form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</head>
<body></body>
</html>
