###################  DataSource Configuration (MySQL)  ##########################
# The monolith still needs its own myplusdb connection even in auth.mode=server:
# local modules (hospital/appointment), Activity logging, local-auth fallback + SetupDataLoader.
jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/myplusdb?createDatabaseIfNotExist=true&verifyServerCertificate=false&useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true
jdbc.user=${DB_USER:root}
jdbc.pass=${DB_PASSWORD:changeme}

#################### Hibernate Configuration ##########################
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.hbm2ddl.auto=update
hibernate.show_sql=true
hibernate.format_sql=true

