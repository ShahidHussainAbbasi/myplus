name: PR Validation

on:
  pull_request:
    branches: [ main, master, feature/microservices ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Validate parent POM
        run: mvn validate -f microservices/pom.xml

      - name: Build all services (no tests)
        run: mvn clean package -DskipTests -f microservices/pom.xml

      - name: Run unit tests
        run: mvn test -f microservices/pom.xml

      - name: Check Docker builds
        run: |
          for svc in eureka-server config-server api-gateway auth-service inventory-service business-service education-service welfare-service agriculture-service pharma-service marketplace-service campaign-service analytics-service; do
            echo "Checking Dockerfile for $svc..."
            docker build --no-cache -f microservices/$svc/Dockerfile microservices/$svc/ -t myplus/$svc:test
          done
