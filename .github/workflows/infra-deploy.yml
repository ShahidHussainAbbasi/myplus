name: Deploy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write   # A7 — OIDC
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      # Required secret tfvars (A1 — no defaults). Set as GitHub Actions secrets.
      TF_VAR_db_password:     ${{ secrets.DB_PASSWORD }}
      TF_VAR_jwt_secret:      ${{ secrets.JWT_SECRET }}
      TF_VAR_internal_secret: ${{ secrets.INTERNAL_SECRET }}
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (A7 — OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -var="aws_region=${{ secrets.AWS_REGION }}" -var="account_id=${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -var="aws_region=${{ secrets.AWS_REGION }}" -var="account_id=${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -var="aws_region=${{ secrets.AWS_REGION }}" -var="account_id=${{ secrets.AWS_ACCOUNT_ID }}"
