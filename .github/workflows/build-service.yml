name: Build and Test Service

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-port:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: '25'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AWS_REGION:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/${{ inputs.service-name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Build & test with Maven (A5 — tests gate the pipeline)
        run: mvn clean package -f pom.xml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push immutable image (A6/A9 — :<sha>, no :latest)
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: myplus/${{ inputs.service-name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy new task-def revision and wait for stable (A6)
        env:
          FAMILY: myplus-${{ inputs.service-name }}
          CLUSTER: myplus-cluster
          SERVICE: ${{ inputs.service-name }}
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          TASKDEF=$(aws ecs describe-task-definition --task-definition "$FAMILY" --query 'taskDefinition')
          NEWDEF=$(echo "$TASKDEF" | jq --arg IMG "$IMAGE" \
            '.containerDefinitions[0].image=$IMG
             | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          REV=$(aws ecs register-task-definition --cli-input-json "$NEWDEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --task-definition "$REV"
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
