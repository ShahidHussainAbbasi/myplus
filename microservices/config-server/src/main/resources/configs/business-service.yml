server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/myplusdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=%2B05:00&forceConnectionTimeZoneToSession=true

# Strangler flag for the sell↔stock saga (slice 33). Default OFF: only ~9% of items have inventory stock
# seeded so far, so enabling globally would reject sells (OUT_OF_STOCK) for unmigrated items. Flip to true
# locally (or via TRADE_SAGA_ENABLED) for saga testing; turn on for real only at U5 cutover once all stock
# is migrated.
trade:
  saga:
    enabled: true
