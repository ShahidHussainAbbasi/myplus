server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/myplusdb_education?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:465}
    protocol: ${MAIL_PROTOCOL:smtps}
    username: ${MAIL_USER:maxtheservice@gmail.com}
    password: "${MAIL_PASSWORD:changeme}"
    properties:
      mail:
        transport:
          protocol: smtps
        smtps:
          auth: true
          starttls:
            enable: true
          timeout: 8000

# Alerts: addresses always copied on every send so delivery is observable.
education:
  alerts:
    admin-recipients: ${ALERT_ADMIN_RECIPIENTS:uncer_sh@yahoo.com,email2uncer@gmail.com}
    from: ${ALERT_FROM:maxtheservice@gmail.com}
