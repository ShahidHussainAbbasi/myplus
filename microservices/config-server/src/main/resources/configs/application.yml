eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:changeme}
    hikari:
      # 11 DB-backed services share one MySQL. Keep each pool small so the total stays well under
      # MySQL max_connections (default 151; docker sets 200): 11 × 8 = 88. Env-overridable for prod.
      maximum-pool-size: ${DB_POOL_MAX:8}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 20000          # fail fast (20s) when the pool is exhausted instead of hanging
      idle-timeout: 300000               # close idle connections after 5 min
      max-lifetime: 1500000              # recycle a connection at 25 min (< MySQL wait_timeout)
      leak-detection-threshold: 30000    # log a warning if a connection is held > 30s (likely a leak)
      # On a cold start-all the DB-backed services hit MySQL at once; let the pool RETRY its first
      # connection for 60s instead of fail-fast (default ~1ms) so a momentarily-busy MySQL doesn't
      # abort boot via Hikari checkFailFast (the Hibernate path; Flyway has its own connect-retries).
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT_MS:60000}
      data-source-properties:
        # MySQL handshake/socket timeouts. On a cold start all 11 services open ~88 connections at
        # once; a slow handshake otherwise surfaces as server error 1159 "Got timeout reading
        # communication packets". Bound the handshake (connectTimeout) and per-query socket read.
        connectTimeout: ${DB_CONNECT_TIMEOUT_MS:20000}
        socketTimeout: ${DB_SOCKET_TIMEOUT_MS:60000}
  # Flyway runs at bean-init (before the app is ready) and, unlike Hibernate ddl-auto, does NOT
  # retry by default — one failed connection aborts flywayInitializer -> entityManagerFactory ->
  # the whole context. Retry the connection so a cold/racing MySQL on start-all doesn't kill boot.
  flyway:
    connect-retries: ${FLYWAY_CONNECT_RETRIES:10}
    connect-retries-interval: ${FLYWAY_CONNECT_RETRIES_INTERVAL:5s}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-change-me-jwt-secret-min-32-bytes-padding}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

# Internal trust secret (Phase 4). The gateway stamps X-Internal-Secret on every authenticated
# request; each service's HeaderAuthFilter trusts the X-User-* identity headers ONLY when it
# matches. Empty default = NOT enforced, so adding this config breaks nothing on its own; set the
# INTERNAL_SECRET env (same value on the gateway and every service) to turn enforcement on. Only
# enable it once the monolith is on auth.mode=server, otherwise its legacy direct-to-service calls
# (which carry no secret) will be rejected.
gateway:
  internal-secret: ${INTERNAL_SECRET:}
service:
  internal-secret: ${INTERNAL_SECRET:}

logging:
  level:
    com.myplus: DEBUG
    org.springframework.web: INFO
    # SQL + DDL query logging for every config-client service (dev defaults ON;
    # set these envs to a higher level, e.g. WARN, to quiet them in production).
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}            # DML statements
    org.hibernate.orm.jdbc.bind: ${SQL_BIND_LOG_LEVEL:TRACE}   # bound parameter values
    org.hibernate.tool.schema: ${DDL_LOG_LEVEL:DEBUG}   # DDL (create/alter from ddl-auto)
