version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: myplus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Technology@2025!
      MYSQL_USER: myplus
      MYSQL_PASSWORD: Technology@2025!
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTechnology@2025!"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    container_name: myplus-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  config-server:
    build: ./config-server
    container_name: myplus-config
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: myplus-gateway
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      CONFIG_URI: http://config-server:8888
      JWT_SECRET: myplus-super-secret-jwt-key-2025-must-be-at-least-256-bits-long
    depends_on:
      config-server:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    container_name: myplus-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/myplusdb_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Technology@2025!
      EUREKA_URI: http://eureka-server:8761/eureka
      CONFIG_URI: http://config-server:8888
      JWT_SECRET: myplus-super-secret-jwt-key-2025-must-be-at-least-256-bits-long
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-email2uncer@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy

  inventory-service:
    build: ./inventory-service
    container_name: myplus-inventory
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/myplusdb_inventory?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Technology@2025!
      EUREKA_URI: http://eureka-server:8761/eureka
      CONFIG_URI: http://config-server:8888
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_healthy

  business-service:
