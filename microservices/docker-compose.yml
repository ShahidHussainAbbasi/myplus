  # The monolith (Thymeleaf UI). Built from the repo root; serves on 8080. Talks to the gateway
  # in-network and to MySQL `myplusdb`. (Build the jar first: from repo root `mvn -DskipTests package`.)
  monolith:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: myplus-monolith
    restart: unless-stopped
    mem_limit: 1024m
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -Xss512k"
      SPRING_PROFILES_ACTIVE: prod
      # P5: the monolith owns no database — no JDBC_URL/DB_* needed. Data lives in the microservices.
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
      AUTH_SERVER_URL: http://api-gateway:8765   # auth.server.url
      GATEWAY_URL: http://api-gateway:8765        # gateway.url
    networks: [myplus-net]
    depends_on:
      api-gateway:
        condition: service_started

networks:
  myplus-net:
    driver: bridge

volumes:
  mysql-data:
