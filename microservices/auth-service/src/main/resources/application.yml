server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/myplusdb_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=%2B05:00&forceConnectionTimeZoneToSession=true
    username: ${DB_USER:shahid}
    password: ${DB_PASSWORD:Technology@2025!}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    open-in-view: false
  # Flyway: baseline the existing (ddl-auto-created) schema at V1 and skip it; a fresh DB runs
  # V1__baseline.sql. Local copy so it applies without a config-server rebuild.
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-change-me-jwt-secret-min-32-bytes-padding}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

app:
  base-url: ${APP_BASE_URL:http://localhost:8765}
  verification-token-expiry-hours: 24
  password-reset-token-expiry-hours: 1
  # Bootstrap seeding (dev defaults true). In prod set BOTH to false (env APP_SEED_ADMIN / APP_SEED_DEMO)
  # so no known-password admin and no shared demo users are created. Real customers come only through
  # signup (/api/auth/register) — never seeded. See slice 32.
  seed-admin: ${APP_SEED_ADMIN:true}
  seed-demo: ${APP_SEED_DEMO:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
