server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/myplusdb_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
    open-in-view: false
  # Flyway: baseline the existing (ddl-auto-created) schema at V1 and skip it; a fresh DB runs
  # V1__baseline.sql. Local copy so it applies without a config-server rebuild.
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-change-me-jwt-secret-min-32-bytes-padding}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

app:
  base-url: ${APP_BASE_URL:http://localhost:8765}
  verification-token-expiry-hours: 24
  password-reset-token-expiry-hours: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
