server:
  port: 8765

spring:
  main:
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  cloud:
    gateway:
      discovery:
        locator:
          # F1: OFF — the locator auto-creates catch-all /{service-id}/** routes that bypass the
          # per-route JwtAuthenticationFilter. Only the explicit, JWT-filtered routes below exist.
          enabled: false
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            # F4: explicit allow-list (comma-separated env), never "*" with allowCredentials.
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:8080}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/api/business/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: education-service
          uri: lb://education-service
          predicates:
            - Path=/api/education/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: welfare-service
          uri: lb://welfare-service
          predicates:
            - Path=/api/welfare/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: agriculture-service
          uri: lb://agriculture-service
          predicates:
            - Path=/api/agriculture/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: pharma-service
          uri: lb://pharma-service
          predicates:
            - Path=/api/pharma/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: marketplace-service
          uri: lb://marketplace-service
          predicates:
            - Path=/api/marketplace/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: campaign-service
          uri: lb://campaign-service
          predicates:
            - Path=/api/campaign/**
          # No StripPrefix: campaign-service controllers are mapped at the full /api/campaign/... path.
          filters:
            - name: JwtAuthenticationFilter
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - name: JwtAuthenticationFilter
            - StripPrefix=2
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointment/**
          # No StripPrefix: appointment-service controllers use the full /api/appointment/... path.
          filters:
            - name: JwtAuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-change-me-jwt-secret-min-32-bytes-padding}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
